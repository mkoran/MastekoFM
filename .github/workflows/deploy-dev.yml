name: Deploy DEV

# Auto-deploys on push to any epic/* branch (DEV is recoverable; standing auth per CLAUDE.md).
# Backend: Cloud Build → Cloud Run service masteko-fm-api-dev.
# Frontend: Firebase Hosting target dev.

on:
  push:
    branches: ['epic/**']
  workflow_dispatch:

permissions:
  contents: write   # to commit the VERSION bump back
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID:        ${{ vars.GCP_PROJECT_ID }}
  REGION:            ${{ vars.GCP_REGION }}
  SERVICE_NAME:      ${{ vars.GCP_BACKEND_SERVICE }}      # e.g., masteko-fm-api-dev
  HOSTING_TARGET:    ${{ vars.FIREBASE_HOSTING_TARGET }}  # dev | prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bump VERSION (MAJOR.NNN) ────────────────────────────────────────────
      - name: Bump VERSION
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]{3}$ ]]; then
            echo "::error::VERSION '$CURRENT' invalid (expected MAJOR.NNN)"
            exit 1
          fi
          MAJOR="${CURRENT%%.*}"
          COUNTER="${CURRENT##*.}"
          COUNTER=$((10#$COUNTER + 1))
          NEW="${MAJOR}.$(printf '%03d' $COUNTER)"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT -> $NEW"

      # ── Auth to GCP via Workload Identity Federation (no secrets!) ──────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Build frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Submit Cloud Build (backend image) ──────────────────────────────────
      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --project="$PROJECT_ID" \
            --config=cloudbuild.yaml \
            --substitutions="_SERVICE_NAME=${SERVICE_NAME},_ENVIRONMENT=dev,_VERSION=${{ steps.bump.outputs.version }}"

      # ── Deploy frontend to Firebase Hosting ─────────────────────────────────
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.GCP_PROJECT_ID }}
          target: ${{ env.HOSTING_TARGET }}
          channelId: live

      # ── Smoke tests (Sprint UX-01 + INFRA-002) ──────────────────────────────
      - name: Post-deploy smoke (health + auth + frontend)
        env:
          # AUTH_TOKEN uses DEV_AUTH_BYPASS — must remain enabled on DEV service.
          AUTH_TOKEN: dev-ci-smoke@example.com
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format="value(status.url)")
          export API_BASE_URL="$SERVICE_URL"
          export HOSTING_URL="https://${HOSTING_TARGET}-masteko-fm.web.app"
          ./scripts/smoke/post_deploy_smoke.sh

      - name: E2E smoke (Sprint INFRA-002 — seed + run + assert Sum=12)
        # Uses Workload Identity Federation creds to mint a Drive-scoped token.
        # Requires the deployer service account to have Editor access to the
        # Drive root folder configured for MastekoFM (one-time setup by Marc).
        env:
          AUTH_TOKEN: dev-ci-smoke@example.com
        run: |
          pip install --quiet google-auth openpyxl
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format="value(status.url)")
          export API_BASE_URL="$SERVICE_URL"
          # --required: this is CI, the deploy MUST fail if e2e fails.
          python scripts/smoke/e2e_run_smoke.py --required

      # ── Commit VERSION bump back to the branch ──────────────────────────────
      - name: Commit VERSION bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]" || echo "No version change"
          git push
